<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thala 7</title>
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="hidden-navbar">
            <button class="hamburger">☰</button>
            <ul class="hidden-nav-links">
                <li class="hidden-nav-item"><a href="#">Home</a></li>
                <li class="hidden-nav-item"><a href="#">About</a></li>
                <li class="hidden-nav-item">
                    <select name="brands" id="brands" class="hidden-selection">
                        <option value="">Brands</option>
                        <option value="nike">Nike</option>
                        <option value="puma">Puma</option>
                    </select>
                </li>
                <li class="hidden-nav-item">
                    <select name="more" id="more" class="hidden-selection">
                        <option value="">More</option>
                        <option value="policy">Policy</option>
                    </select>
                </li>
                <li class="hidden-nav-item"><a href="#">Contact</a></li>
            </ul>
        </div>
        <nav class="navbar">
            <div class="logo-container">
                <img src="images/brand-logo.png" alt="brand logo" class="brand-logo">
            </div>

            <ul class="nav-links">
                <li class="nav-item"><a href="#">Home</a></li>
                <li class="nav-item"><a href="#">About</a></li>
                <li class="nav-item">
                    <select name="brands" id="brands" class="selection">
                        <option value="">Brands</option>
                        <option value="nike">Nike</option>
                        <option value="puma">Puma</option>
                    </select>
                </li>
                <li class="nav-item">
                    <select name="more" id="more" class="selection">
                        <option value="">More</option>
                        <option value="policy">Policy</option>
                    </select>
                </li>
                <li class="nav-item"><a href="#">Contact</a></li>
            </ul>

            <div class="search-profile">
                <div class="search-bar">
                    <span class="search-icon">🔍︎</span>
                    <input type="text" placeholder="Search">
                </div>
                <div class="nav-cart">
                    <a href="./Pages/cart.html" target="_blank">
                        <img src="images/shopping-bag.png" alt="cart icon" class="cart-icon">
                    </a>
                    <span class="cart-quantity">3</span>
                </div>
                <div class="profile">
                    <img src="images/profile-icon.jpg" alt="profile icon" class="profile-icon">
                </div>
            </div>

        </nav>
    </header>
    <main class="container">
        <div class="hero-section">
            <div class="black-filter">

                <div class="hero-left">
                    <div class="hero-heading">
                        <h1>7!! Thala For a <span class="highlight">Reason!</span></h1>
                    </div>
                    <div class="hero-description">
                        Aggressive streetwear design meets high-rebound cushioning. Engineered for ultimate comfort,
                        built
                        to dominate the
                        streets.
                    </div>
                    <div class="btn-container">
                        <a href="./Pages/product.html" target="_blank" class="hero-btn">Shop Now</a>
                    </div>
                </div>
                <div class="hero-right">
                    <img src="images/hero-image.png" alt="shoe showcase" class="hero-img">
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-section">
            <div class="icon-container">
                <img src="./icons/review.png" alt="review icon" class="footer-icon">
            </div>
            <div class="footer-section-desc">
                <h3 class="footer-heading">2K+</h3>
                <p class="footer-description">Reviews</p>
            </div>
        </div>
        <div class="footer-section">
            <div class="icon-container">
                <img src="./icons/customer.png" alt="customer icon" class="footer-icon">
            </div>
            <div class="footer-section-desc">
                <h3 class="footer-heading">30K+</h3>
                <p class="footer-description">Customers</p>
            </div>
        </div>
        <div class="footer-section">
            <div class="icon-container">
                <img src="./icons/high-quality.png" alt="quality icon" class="footer-icon">
            </div>
            <div class="footer-section-desc">
                <h3 class="footer-heading">High</h3>
                <p class="footer-description">Quality</p>
            </div>
        </div>
        <div class="footer-section">
            <div class="icon-container">
                <img src="./icons/rate.png" alt="rating icon" class="footer-icon">
            </div>
            <div class="footer-section-desc">
                <h3 class="footer-heading">4.5/5</h3>
                <p class="footer-description">Rating</p>
            </div>
        </div>
    </footer>
</body>

</html>
