<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 6</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="left">
            <img src="images/advertisement1.png" alt="laundry image" class="image">
        </div>

        <div class="right">
            <div class="welcome">
                <h1>Hello Again!</h1>
                <p>Welcome back! we missed you!</p>
            </div>

            <form action="#" class="form">

                <div class="email-container field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Emailid@site.com">
                </div>

                <div class="password-container field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password">
                    <p class="forgot"><a href="#">Forgot Password</a></p>
                </div>

                <button class="btn">Login</button>

                <p class="register-text">Not a member? <a href="#" class="register-link">Register Now</a></p>
            </form>
        </div>
    </div>

</body>

</html>
